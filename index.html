<!-- ❗ 위쪽 HTML/CSS는 그대로 두고 SCRIPT만 교체해도 됨 -->
<script>
const SKEY = 'invest-logs-v6';
const GKEY = 'invest-goals-v1';
let records = [];
let goals = null;
let charts = {};
let qsParsed = null;
let selectedMonth = 'all';

document.getElementById('inp-date').value = new Date().toISOString().slice(0,10);

// ── 월 목록 ──
function getMonths(){
  return [...new Set(records.map(r=>r.date.slice(0,7)))].sort();
}

// ── 월별 증가량 차트 ──
function renderMonthlyCharts(){
  const wrap=document.getElementById('monthly-charts');
  ['mc-shares','mc-div'].forEach(k=>{
    try{if(charts[k])charts[k].destroy();}catch(e){}
  });

  const months=getMonths();
  if(!months.length){wrap.innerHTML='';return;}

  const monthData=months.map(ym=>{
    const recs=records.filter(r=>r.date.startsWith(ym));
    if(!recs.length)return null;

    const last=recs[recs.length-1];
    const allBefore=records.filter(r=>r.date<recs[0].date);
    const prev=allBefore.length?allBefore[allBefore.length-1]:null;

    return {
      label:ym.slice(5)+'월',
      plusGain:prev?last.plusSh-prev.plusSh:last.plusSh-recs[0].plusSh,
      kodexGain:prev?last.kodexSh-prev.kodexSh:last.kodexSh-recs[0].kodexSh,
      divGain:prev
        ?(last.plusSh*156+last.kodexSh*244-(prev.plusSh*156+prev.kodexSh*244))/10000
        :0
    };
  }).filter(Boolean);

  wrap.innerHTML='';

  // ── 수량 증가 ──
  const r1=document.createElement('div');
  r1.className='chart-box';
  r1.innerHTML='<div class="chart-title">📦 종목별 수량 증가 (월별)</div><canvas id="mc-shares"></canvas>';
  wrap.appendChild(r1);

  charts['mc-shares']=new Chart(document.getElementById('mc-shares'),{
    type:'bar',
    data:{
      labels:monthData.map(d=>d.label),
      datasets:[
        {label:'PLUS',data:monthData.map(d=>d.plusGain)},
        {label:'KODEX',data:monthData.map(d=>d.kodexGain)}
      ]
    }
  });

  // ── 배당 증가 ──
  const r2=document.createElement('div');
  r2.className='chart-box';
  r2.innerHTML='<div class="chart-title">📈 월 배당 증가액</div><canvas id="mc-div"></canvas>';
  wrap.appendChild(r2);

  charts['mc-div']=new Chart(document.getElementById('mc-div'),{
    type:'bar',
    data:{
      labels:monthData.map(d=>d.label),
      datasets:[
        {label:'배당 증가',data:monthData.map(d=>+d.divGain.toFixed(2))}
      ]
    }
  });
}

// ── 기본 로드 ──
function loadData(){
  try{
    const r=localStorage.getItem(SKEY);
    if(r)records=JSON.parse(r);
  }catch(e){records=[];}

  if(records.length===0){
    records=[
      {date:'2026-03-09',total:4442572,plusSh:200,kodexSh:36},
      {date:'2026-03-10',total:4619025,plusSh:201,kodexSh:36},
      {date:'2026-03-23',total:5011794,plusSh:248,kodexSh:42},
    ];
  }
}

// ── 실행 ──
loadData();
renderMonthlyCharts();
</script>
